name: CD — Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["Publish Container Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ── Gate: verify CI passed for this commit ─────────────────────────
  gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status for commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ env.IMAGE_TAG }}';
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
            });
            const ciRun = workflow_runs.find(r => r.name === 'CI' && r.conclusion === 'success');
            if (!ciRun) {
              core.setFailed(`CI workflow has not succeeded for commit ${sha}. Aborting deployment.`);
            } else {
              core.info(`CI workflow passed for commit ${sha} (run #${ciRun.run_number})`);
            }

  # ── Deploy to Azure Container Apps ─────────────────────────────────
  deploy:
    needs: gate
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: registry-api
            ca-name: ca-registry-api
            target-port: 3001
            startup-path: /health/startup
            liveness-path: /health/live
            readiness-path: /health/ready
            cors-origin: "*"
            store-backend: blob
            storage-account-name: hubdemokioskst
            storage-container-name: demo-registry
          - app: launcher
            ca-name: ca-launcher
            target-port: 80
            startup-path: /
            liveness-path: /
            readiness-path: /health/ready
            api-backend-url: "http://ca-registry-api"
          - app: admin
            ca-name: ca-admin
            target-port: 80
            startup-path: /
            liveness-path: /
            readiness-path: /
            api-backend-url: "http://ca-registry-api"
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate deployment template
        run: |
          IMAGE="${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:${{ env.IMAGE_TAG }}"
          {
            echo "properties:"
            echo "  template:"
            echo "    containers:"
            echo "    - name: ${{ matrix.app }}"
            echo "      image: ${IMAGE}"
            if [ -n "${{ matrix['api-backend-url'] }}" ]; then
              echo "      env:"
              echo "      - name: API_BACKEND_URL"
              echo "        value: ${{ matrix['api-backend-url'] }}"
            elif [ -n "${{ matrix['cors-origin'] }}" ]; then
              echo "      env:"
              echo "      - name: CORS_ORIGIN"
              echo "        value: \"${{ matrix['cors-origin'] }}\""
              if [ -n "${{ matrix['store-backend'] }}" ]; then
                echo "      - name: STORE_BACKEND"
                echo "        value: ${{ matrix['store-backend'] }}"
                echo "      - name: AZURE_STORAGE_ACCOUNT_NAME"
                echo "        value: ${{ matrix['storage-account-name'] }}"
                echo "      - name: AZURE_STORAGE_CONTAINER_NAME"
                echo "        value: ${{ matrix['storage-container-name'] }}"
              fi
            fi
            echo "      probes:"
            echo "      - type: startup"
            echo "        httpGet:"
            echo "          path: ${{ matrix['startup-path'] }}"
            echo "          port: ${{ matrix['target-port'] }}"
            echo "        initialDelaySeconds: 5"
            echo "        periodSeconds: 10"
            echo "      - type: liveness"
            echo "        httpGet:"
            echo "          path: ${{ matrix['liveness-path'] }}"
            echo "          port: ${{ matrix['target-port'] }}"
            echo "        periodSeconds: 30"
            echo "      - type: readiness"
            echo "        httpGet:"
            echo "          path: ${{ matrix['readiness-path'] }}"
            echo "          port: ${{ matrix['target-port'] }}"
            echo "        periodSeconds: 10"
          } > /tmp/deploy.yaml

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ matrix['ca-name'] }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --yaml /tmp/deploy.yaml \
            --output none

      - name: Log deployed revision
        run: |
          REVISION=$(az containerapp revision list \
            --name "${{ matrix['ca-name'] }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "sort_by([],&properties.createdTime)[-1].name" \
            --output tsv)

          IMAGE="${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:${{ env.IMAGE_TAG }}"

          echo "### Deployed ${{ matrix.app }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Revision:** ${REVISION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${IMAGE}" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=${{ matrix.app }}::Deployed revision ${REVISION}"
