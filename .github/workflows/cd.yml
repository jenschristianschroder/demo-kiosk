name: CD — Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ── Publish container images to ACR ────────────────────────────────
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    name: Publish ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: registry-api
            context: services/registry-api
          - app: launcher
            context: apps/launcher
          - app: admin
            context: apps/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:${{ env.IMAGE_TAG }}
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.context }}
          cache-to: type=gha,mode=max,scope=${{ matrix.context }}

  # ── Deploy to Azure Container Apps ─────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.app }}
    needs: publish
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: registry-api
            target-port: 3001
            startup-path: /health/startup
            liveness-path: /health/live
            readiness-path: /health/ready
          - app: launcher
            target-port: 80
            startup-path: /
            liveness-path: /
            readiness-path: /health/ready
          - app: admin
            target-port: 80
            startup-path: /
            liveness-path: /
            readiness-path: /
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate deployment template
        run: |
          IMAGE="${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:${{ env.IMAGE_TAG }}"
          cat > /tmp/deploy.yaml <<EOF
          properties:
            template:
              containers:
              - name: ${{ matrix.app }}
                image: ${IMAGE}
                probes:
                - type: startup
                  httpGet:
                    path: ${{ matrix.startup-path }}
                    port: ${{ matrix.target-port }}
                  initialDelaySeconds: 5
                  periodSeconds: 10
                - type: liveness
                  httpGet:
                    path: ${{ matrix.liveness-path }}
                    port: ${{ matrix.target-port }}
                  periodSeconds: 30
                - type: readiness
                  httpGet:
                    path: ${{ matrix.readiness-path }}
                    port: ${{ matrix.target-port }}
                  periodSeconds: 10
          EOF

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ matrix.app }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --yaml /tmp/deploy.yaml \
            --output none

      - name: Log deployed revision
        run: |
          REVISION=$(az containerapp revision list \
            --name "${{ matrix.app }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "sort_by([],&properties.createdTime)[-1].name" \
            --output tsv)

          IMAGE="${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.app }}:${{ env.IMAGE_TAG }}"

          echo "### Deployed ${{ matrix.app }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Revision:** ${REVISION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${IMAGE}" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=${{ matrix.app }}::Deployed revision ${REVISION}"
